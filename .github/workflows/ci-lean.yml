name: CI (Lean)
on:
  push:
    branches: [main]
    paths:
      - 'lean/**'
      - '.github/workflows/ci-lean.yml'
  pull_request:
    branches: [main]
    paths:
      - 'lean/**'
      - '.github/workflows/ci-lean.yml'

permissions:
  contents: read

jobs:
  build-corpus:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install elan
        run: |
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Resolve toolchain from lean-toolchain
        working-directory: lean
        run: |
          elan toolchain install "$(cat lean-toolchain)"
          elan default "$(cat lean-toolchain)"

      - name: Lake update + cache get + build
        working-directory: lean
        run: |
          lake update
          lake exe cache get || echo "cache miss; will build mathlib from source"
          lake build

      - name: Verify zero sorries / zero user-defined axioms
        working-directory: lean
        run: |
          if grep -rEn "^\s*sorry\b" Wyrd/; then
            echo "::error::sorry found in proof body"; exit 1
          fi
          if grep -rEn "^axiom " Wyrd/; then
            echo "::error::user-defined axiom found"; exit 1
          fi
