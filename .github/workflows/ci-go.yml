name: CI (Go)
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  # Modules under the JamesPagetButler/* prefix are private; bypass the
  # public Go module proxy + sum database. Closeout Q7 (PATs with 90-day
  # rotation) is the chosen path for cross-repo CI access; see the
  # WYRD_PAT secret setup below.
  GOPRIVATE: github.com/JamesPagetButler/*

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: Configure git for private JamesPagetButler/* modules
        # WYRD_PAT must be a fine-grained or classic PAT with read access
        # to JamesPagetButler/qbp-compute-unit (Walk-α prerequisite per
        # closeout Q7; rotate every 90 days). If the secret is missing,
        # the step is a no-op and Go falls back to the failing public
        # path so the failure mode is visible.
        env:
          WYRD_PAT: ${{ secrets.WYRD_PAT }}
        run: |
          if [ -n "$WYRD_PAT" ]; then
            git config --global url."https://x-access-token:${WYRD_PAT}@github.com/".insteadOf "https://github.com/"
          else
            echo "WYRD_PAT secret not set; private-module fetches will fail. Set the secret per closeout Q7."
          fi
      - run: go build ./...
      - run: go vet ./...
      - run: go test -race -coverprofile=coverage.out ./...
      - uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: Configure git for private JamesPagetButler/* modules
        env:
          WYRD_PAT: ${{ secrets.WYRD_PAT }}
        run: |
          if [ -n "$WYRD_PAT" ]; then
            git config --global url."https://x-access-token:${WYRD_PAT}@github.com/".insteadOf "https://github.com/"
          else
            echo "WYRD_PAT secret not set; private-module fetches will fail. Set the secret per closeout Q7."
          fi
      - uses: golangci/golangci-lint-action@v7
        with:
          version: latest
