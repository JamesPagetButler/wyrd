version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    # Correctness
    - govet
    - errcheck
    - staticcheck
    - ineffassign
    - unused
    # Error handling
    - errorlint
    - nilerr
    # Style
    - revive
    - misspell
    - unconvert
    - goconst
    - nakedret
    # Performance
    - prealloc
    # Security
    - gosec

  settings:
    revive:
      rules:
        - name: exported
          arguments:
            - checkPrivateReceivers
            - sayRepetitiveInsteadOfStutters
        - name: var-naming
        - name: indent-error-flow
        - name: blank-imports
        - name: context-keys-type
        - name: time-naming
        - name: unreachable-code

formatters:
  enable:
    - gofmt
    - goimports

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
